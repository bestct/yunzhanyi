<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="common-hand">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,Chrome=1"/>
    <meta http-equiv="X-UA-Compatible" content="IE=9"/>
    <!-- import CSS -->
    <base href="http://www.yunzhanyi.net/">

    <link rel="icon" type="image/x-icon" href="image/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>

        ::-webkit-scrollbar { /* 血槽宽度 */
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb { /* 拖动条 */
            background-color: rgb(213, 183, 229);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-track { /* 背景槽 */
            background-color: #6f6868;
            border-radius: 6px;

        }

        html ,body , #app,el-container{
            height: 100%;
        }
        .el-header {
            background-color: #ece8b0;
            color: #333;
            line-height: 60px;
        }

        .aside{
         overflow: hidden;
        }
        .el-aside {
            height: 100%;
            color: #333;
            background-color: rgb(84, 92, 100)
        }
    </style>

</head>
<body>
<div id="app">
    <el-container style=" border: 1px solid #b1fadc">
        <el-aside style="background-color: rgb(84,92,100);height: 100%">
            <div id="aside" class="aside">
                <el-menu
                        default-active="2"
                        @close="handleClose"
                        background-color="#545c64"
                        text-color="#fff"
                        active-text-color="#ffd04b">
                    <el-submenu index="1" sec:authorize="hasAuthority('admin_check')">
                        <template slot="title">
                            <i class="el-icon-lock"></i>
                            <span slot="title">权限模块</span>
                        </template>
                        <el-menu-item index="1-1">
                            <el-link href="admin/manager" type="primary" underline="false">管理员列表</el-link>
                        </el-menu-item>

                            <el-menu-item index="1-2">
                            <el-link href="role/manager" type="primary" underline="false">角色列表</el-link>
                        </el-menu-item>
                        <el-menu-item index="1-3">
                            <el-link href="authority/manager" type="primary" underline="false">权限列表</el-link>
                        </el-menu-item>
                    </el-submenu>
                    <el-submenu index="2">
                        <template slot="title">
                            <i class="el-icon-s-management"></i>
                            <span slot="title">诗文模块</span>
                        </template>
                        <el-menu-item index="2-1">
                            <el-link href="writing/manager" type="primary" underline="false">诗文管理</el-link>
                        </el-menu-item>

                        <el-menu-item index="2-2">
                            <el-link href="author/manager" type="primary" underline="false">作者管理</el-link>
                        </el-menu-item>

                        <el-menu-item index="2-3">
                            <el-link href="corpus/manager" type="primary" underline="false">文集管理</el-link>
                        </el-menu-item>
                    </el-submenu>

                </el-menu>
            </div>
        </el-aside>

        <el-container>
            <el-header>
                <div id="header">
                    <div style="text-align: center"> <span style="font-size: 28px">云沾衣-管理中心</span>
                    <el-dropdown style=" float: right;font-size: 18px" trigger="hover">
                    <span>
                        <span sec:authentication="principal.username"></span>
                    <i class="el-icon-s-tools" style="margin-right: 20px"></i>
                    </span>

                        <el-dropdown-menu slot="dropdown">
                            <el-dropdown-item>
                                <i class="el-icon-user-solid"></i>
                                <span>
                            个人信息
                        </span>
                            </el-dropdown-item>
                            <el-dropdown-item>
                                <i class="el-icon-key"></i>
                                <span>
                           <el-link href="to/change/password" underline="false">
                            修改密码
                           </el-link>
                        </span>
                            </el-dropdown-item>
                            <el-dropdown-item>
                                <i class="el-icon-switch-button"></i>
                                <span>
                                <el-link href="logout" underline="false">
                                    退出系统
                                </el-link>
                        </span>
                            </el-dropdown-item>
                        </el-dropdown-menu>
                    </el-dropdown>
                    </div>
                </div>
            </el-header>
            </el-main>
        </el-container>
    </el-container>
</div>
<div id="common-script">
    <script src="https://unpkg.com/vue/dist/vue.js"></script>
    <!-- import JavaScript -->
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="vue/axios.min.js"></script>
    <script src="vue/qs.js"></script>
</div>
</body>
</html>
